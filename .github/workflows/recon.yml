name: 🔍 GitHub Actions Runner 侦察报告

on:
  workflow_dispatch:
    inputs:
      include_gpu:
        description: '是否尝试探测 GPU（部分 runner 无 GPU）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # ============================================================
  # 在 Linux 上采集信息
  # ============================================================
  probe-runners:
    name: 侦察 ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: 📋 采集系统配置（Linux）
        shell: bash
        run: |
          FILE="report-ubuntu-latest.txt"
          SEP="============================================================"

          echo "$SEP" >> "$FILE"
          echo "  GitHub Actions Runner 侦察报告"
          echo "  OS: ubuntu-latest"
          echo "  Runner: $RUNNER_NAME"
          echo "  采集时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "$SEP"
          echo ""

          echo "==================== 1. 系统基本信息 ====================" >> "$FILE"
          echo "主机名: $(hostname)" >> "$FILE"
          echo "操作系统: $(cat /etc/os-release 2>/dev/null | grep PRETTY_NAME | cut -d'"' -f2)" >> "$FILE"
          echo "内核版本: $(uname -r)" >> "$FILE"
          echo "架构: $(uname -m)" >> "$FILE"
          echo "DNS 域名: $(dnsdomainname 2>/dev/null || echo 'N/A')" >> "$FILE"
          echo ""

          echo "==================== 2. GitHub Actions 元数据 ====================" >> "$FILE"
          echo "Runner Name: $RUNNER_NAME" >> "$FILE"
          echo "Runner OS: $RUNNER_OS" >> "$FILE"
          echo "Runner Arch: $RUNNER_ARCH" >> "$FILE"
          echo "Runner Temp: $RUNNER_TEMP" >> "$FILE"
          echo "Runner Tool Cache: $RUNNER_TOOL_CACHE" >> "$FILE"
          echo "Runner Workspace: $RUNNER_WORKSPACE" >> "$FILE"
          echo "Image OS: $ImageOS" >> "$FILE"
          echo "Image Version: $ImageVersion" >> "$FILE"
          echo "Actions: $GITHUB_ACTIONS" >> "$FILE"
          echo "Server URL: $GITHUB_SERVER_URL" >> "$FILE"
          echo ""

          echo "==================== 3. CPU 信息 ====================" >> "$FILE"
          echo "--- lscpu ---" >> "$FILE"
          lscpu 2>/dev/null >> "$FILE" || echo "lscpu not available" >> "$FILE"
          echo ""
          echo "--- /proc/cpuinfo (model name) ---" >> "$FILE"
          grep "model name" /proc/cpuinfo 2>/dev/null | head -1 >> "$FILE" || echo "N/A" >> "$FILE"
          echo "--- /proc/cpuinfo (flags) ---" >> "$FILE"
          grep "flags" /proc/cpuinfo 2>/dev/null | head -1 >> "$FILE" || echo "N/A" >> "$FILE"
          echo "--- CPU 缓存 ---" >> "$FILE"
          echo "L1d: $(lscpu 2>/dev/null | grep 'L1d cache' | awk '{print $NF}')" >> "$FILE"
          echo "L1i: $(lscpu 2>/dev/null | grep 'L1i cache' | awk '{print $NF}')" >> "$FILE"
          echo "L2:  $(lscpu 2>/dev/null | grep 'L2 cache' | awk '{print $NF}')" >> "$FILE"
          echo "L3:  $(lscpu 2>/dev/null | grep 'L3 cache' | awk '{print $NF}')" >> "$FILE"
          echo "--- CPU 拓扑 ---" >> "$FILE"
          lscpu 2>/dev/null | grep -E "Socket|Core|Thread|NUMA|CPU\(s\):" >> "$FILE"
          echo ""

          echo "==================== 4. 内存信息 ====================" >> "$FILE"
          echo "--- free -h ---" >> "$FILE"
          free -h >> "$FILE"
          echo ""
          echo "--- /proc/meminfo ---" >> "$FILE"
          cat /proc/meminfo >> "$FILE"
          echo ""
          echo "--- dmidecode (需 root，可能失败) ---" >> "$FILE"
          sudo dmidecode -t memory 2>/dev/null | head -50 >> "$FILE" || echo "(需要 root 权限，跳过 dmidecode)" >> "$FILE"
          echo ""
          echo "--- vm.swappiness ---" >> "$FILE"
          cat /proc/sys/vm/swappiness >> "$FILE"
          echo ""

          echo "==================== 5. GPU 信息 ====================" >> "$FILE"
          echo "--- lspci | grep -i vga ---" >> "$FILE"
          lspci 2>/dev/null | grep -i -E "vga|3d|display" >> "$FILE" || echo "lspci not available" >> "$FILE"
          echo ""
          echo "--- nvidia-smi ---" >> "$FILE"
          nvidia-smi 2>/dev/null >> "$FILE" || echo "No NVIDIA GPU detected" >> "$FILE"
          echo ""
          echo "--- rocm-smi / amd-smi ---" >> "$FILE"
          rocm-smi 2>/dev/null >> "$FILE" || amd-smi static 2>/dev/null >> "$FILE" || echo "No AMD GPU detected" >> "$FILE"
          echo ""
          echo "--- ls /dev/dri ---" >> "$FILE"
          ls -la /dev/dri/ 2>/dev/null || echo "No /dev/dri" >> "$FILE"
          echo ""
          echo "--- /sys/class/drm ---" >> "$FILE"
          ls /sys/class/drm/ 2>/dev/null || echo "N/A" >> "$FILE"
          echo ""
          echo "--- OpenGL info (glxinfo) ---" >> "$FILE"
          glxinfo 2>/dev/null | grep -E "OpenGL vendor|OpenGL renderer|OpenGL version" >> "$FILE" || echo "glxinfo not available" >> "$FILE"
          echo ""

          echo "==================== 6. 磁盘信息 ====================" >> "$FILE"
          echo "--- df -hT ---" >> "$FILE"
          df -hT >> "$FILE"
          echo ""
          echo "--- lsblk ---" >> "$FILE"
          lsblk 2>/dev/null >> "$FILE" || echo "lsblk not available" >> "$FILE"
          echo ""
          echo "--- fdisk -l (需 root) ---" >> "$FILE"
          sudo fdisk -l 2>/dev/null | head -30 >> "$FILE" || echo "(需要 root 权限，跳过)" >> "$FILE"
          echo ""
          echo "--- 文件系统类型 ---" >> "$FILE"
          mount | grep -E "^/dev" >> "$FILE"
          echo ""
          echo "--- I/O 调度器 ---" >> "$FILE"
          for disk in /sys/block/sd* /sys/block/nvme* /sys/block/vd*; do
            if [ -d "$disk" ]; then
              echo "$(basename $disk): $(cat $disk/queue/scheduler 2>/dev/null || echo N/A)" >> "$FILE"
            fi
          done
          echo ""

          echo "==================== 7. 网络信息 ====================" >> "$FILE"
          echo "--- 公网 IP ---" >> "$FILE"
          curl -s --max-time 10 ifconfig.me >> "$FILE" 2>&1
          echo "" >> "$FILE"
          echo "--- curl -s ip.sb ---" >> "$FILE"
          curl -s --max-time 10 ip.sb >> "$FILE" 2>&1
          echo "" >> "$FILE"
          echo "--- curl -s icanhazip.com ---" >> "$FILE"
          curl -s --max-time 10 icanhazip.com >> "$FILE" 2>&1
          echo "" >> "$FILE"
          echo ""
          echo "--- Cloudflare 1.1.1.1 cdn-cgi/trace ---" >> "$FILE"
          curl -s --max-time 10 https://1.1.1.1/cdn-cgi/trace >> "$FILE" 2>&1
          echo "" >> "$FILE"
          echo "--- Cloudflare 1.0.0.1 cdn-cgi/trace ---" >> "$FILE"
          curl -s --max-time 10 https://1.0.0.1/cdn-cgi/trace >> "$FILE" 2>&1
          echo "" >> "$FILE"
          echo "--- Cloudflare www cdn-cgi/trace (对比) ---" >> "$FILE"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace >> "$FILE" 2>&1
          echo "" >> "$FILE"
          echo "--- User-Agent 探测 ---" >> "$FILE"
          echo "curl 默认 UA:" >> "$FILE"
          curl -s --max-time 10 -I https://www.google.com 2>/dev/null | grep -i "user-agent" >> "$FILE" || echo "  $(curl --version | head -1)" >> "$FILE"
          echo "wget UA:" >> "$FILE"
          wget --version 2>/dev/null | head -1 >> "$FILE" || echo "  wget not installed" >> "$FILE"
          echo "requests User-Agent (Python):" >> "$FILE"
          python3 -c "import requests; print('  ' + requests.utils.default_headers()['User-Agent'])" 2>/dev/null || echo "  python requests not available" >> "$FILE"
          echo "urllib User-Agent:" >> "$FILE"
          python3 -c "from urllib.request import Request; r = Request('https://httpbin.org/user-agent'); print('  ' + __import__('urllib.request').urlopen(r).read().decode())" 2>/dev/null || echo "  urllib request failed" >> "$FILE"
          echo "httpbin.org/headers (完整请求头):" >> "$FILE"
          curl -s --max-time 10 https://httpbin.org/headers 2>/dev/null | python3 -m json.tool 2>/dev/null >> "$FILE" || curl -s --max-time 10 https://httpbin.org/headers >> "$FILE" 2>&1
          echo "" >> "$FILE"
          echo "--- httpbin.org/ip ---" >> "$FILE"
          curl -s --max-time 10 https://httpbin.org/ip >> "$FILE" 2>&1
          echo "" >> "$FILE"
          echo "" >> "$FILE"
          echo "--- ip addr ---" >> "$FILE"
          ip addr 2>/dev/null >> "$FILE" || ifconfig 2>/dev/null >> "$FILE" || echo "N/A" >> "$FILE"
          echo ""
          echo "--- ip route ---" >> "$FILE"
          ip route 2>/dev/null >> "$FILE" || route -n 2>/dev/null >> "$FILE" || echo "N/A" >> "$FILE"
          echo ""
          echo "--- DNS 配置 ---" >> "$FILE"
          cat /etc/resolv.conf >> "$FILE"
          echo ""
          echo "--- 网络接口详情 ---" >> "$FILE"
          ip -d link 2>/dev/null >> "$FILE" || echo "N/A" >> "$FILE"
          echo ""
          echo "--- /proc/net/ ---" >> "$FILE"
          echo "ARP:" >> "$FILE"
          cat /proc/net/arp 2>/dev/null >> "$FILE" || echo "N/A" >> "$FILE"
          echo "--- 防火墙状态 ---" >> "$FILE"
          sudo iptables -L -n -v 2>/dev/null | head -30 >> "$FILE" || echo "(需要 root 权限，跳过)" >> "$FILE"
          echo ""
          echo "--- 网络带宽测试 (iperf3，可选) ---" >> "$FILE"
          which iperf3 >/dev/null 2>&1 && echo "iperf3 available" >> "$FILE" || echo "iperf3 not installed" >> "$FILE"
          echo ""

          echo "==================== 8. 环境变量 ====================" >> "$FILE"
          env | sort >> "$FILE"
          echo ""

          echo "==================== 9. 已安装软件 ====================" >> "$FILE"
          echo "--- 包管理器列表数量 ---" >> "$FILE"
          echo "dpkg: $(dpkg -l 2>/dev/null | wc -l) packages" >> "$FILE"
          echo "snap: $(snap list 2>/dev/null | wc -l) snaps" >> "$FILE"
          echo "npm global: $(npm list -g --depth=0 2>/dev/null | wc -l) packages" >> "$FILE"
          echo "pip: $(pip list 2>/dev/null | wc -l) packages" >> "$FILE"
          echo "--- 工具版本 ---" >> "$FILE"
          echo "bash: $(bash --version | head -1)" >> "$FILE"
          echo "gcc: $(gcc --version 2>/dev/null | head -1 || echo N/A)" >> "$FILE"
          echo "g++: $(g++ --version 2>/dev/null | head -1 || echo N/A)" >> "$FILE"
          echo "clang: $(clang --version 2>/dev/null | head -1 || echo N/A)" >> "$FILE"
          echo "rustc: $(rustc --version 2>/dev/null || echo N/A)" >> "$FILE"
          echo "go: $(go version 2>/dev/null || echo N/A)" >> "$FILE"
          echo "java: $(java -version 2>&1 | head -1 || echo N/A)" >> "$FILE"
          echo "node: $(node --version 2>/dev/null || echo N/A)" >> "$FILE"
          echo "python: $(python3 --version 2>/dev/null || echo N/A)" >> "$FILE"
          echo "ruby: $(ruby --version 2>/dev/null || echo N/A)" >> "$FILE"
          echo "docker: $(docker --version 2>/dev/null || echo N/A)" >> "$FILE"
          echo "git: $(git --version 2>/dev/null || echo N/A)" >> "$FILE"
          echo "make: $(make --version 2>/dev/null | head -1 || echo N/A)" >> "$FILE"
          echo "cmake: $(cmake --version 2>/dev/null | head -1 || echo N/A)" >> "$FILE"
          echo ""

          echo "==================== 10. 容器 / 虚拟化信息 ====================" >> "$FILE"
          echo "--- 是否在 Docker 中 ---" >> "$FILE"
          if [ -f /.dockerenv ]; then echo "YES (/.dockerenv exists)" >> "$FILE"; else echo "No .dockerenv found" >> "$FILE"; fi
          echo ""
          echo "--- systemd-detect-virt ---" >> "$FILE"
          systemd-detect-virt 2>/dev/null >> "$FILE" || echo "systemd-detect-virt not available" >> "$FILE"
          echo ""
          echo "--- /proc/1/cgroup (前 10 行) ---" >> "$FILE"
          head -10 /proc/1/cgroup 2>/dev/null >> "$FILE"
          echo ""
          echo "--- Docker info ---" >> "$FILE"
          docker info 2>/dev/null | head -40 >> "$FILE" || echo "Docker not available" >> "$FILE"
          echo ""

          echo "==================== 11. 内核模块 & 安全 ====================" >> "$FILE"
          echo "--- lsmod (前 30 行) ---" >> "$FILE"
          lsmod 2>/dev/null | head -30 >> "$FILE" || echo "N/A" >> "$FILE"
          echo ""
          echo "--- SELinux ---" >> "$FILE"
          getenforce 2>/dev/null >> "$FILE" || echo "SELinux not present" >> "$FILE"
          echo ""
          echo "--- AppArmor ---" >> "$FILE"
          aa-status 2>/dev/null | head -10 >> "$FILE" || echo "AppArmor not available" >> "$FILE"
          echo ""
          echo "--- CPU 安全漏洞 (spectre/meltdown) ---" >> "$FILE"
          grep -r . /sys/devices/system/cpu/vulnerabilities/ 2>/dev/null >> "$FILE" || echo "N/A" >> "$FILE"
          echo ""

          echo "==================== 12. 进程 & 资源限制 ====================" >> "$FILE"
          echo "--- ulimit -a ---" >> "$FILE"
          ulimit -a >> "$FILE"
          echo ""
          echo "--- nproc ---" >> "$FILE"
          nproc >> "$FILE"
          echo ""
          echo "--- top -bn1 | head -20 ---" >> "$FILE"
          top -bn1 2>/dev/null | head -20 >> "$FILE"
          echo ""
          echo "--- cgroup 限制 ---" >> "$FILE"
          echo "CPU quota: $(cat /sys/fs/cgroup/cpu/cpu.cfs_quota_us 2>/dev/null || echo N/A)" >> "$FILE"
          echo "CPU period: $(cat /sys/fs/cgroup/cpu/cpu.cfs_period_us 2>/dev/null || echo N/A)" >> "$FILE"
          echo "Memory limit: $(cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo N/A)" >> "$FILE"
          echo "PIDs max: $(cat /sys/fs/cgroup/pids/pids.max 2>/dev/null || echo N/A)" >> "$FILE"
          echo ""

          echo "==================== 13. 编译器 & 构建工具 ====================" >> "$FILE"
          echo "gcc target: $(gcc -dumpmachine 2>/dev/null || echo N/A)" >> "$FILE"
          echo "gcc version: $(gcc -dumpversion 2>/dev/null || echo N/A)" >> "$FILE"
          echo "clang target: $(clang -dumpmachine 2>/dev/null || echo N/A)" >> "$FILE"
          echo "ld (linker): $(ld --version 2>/dev/null | head -1 || echo N/A)" >> "$FILE"
          echo "gold linker: $(which gold 2>/dev/null || echo N/A)" >> "$FILE"
          echo ""

          echo "==================== 14. 其他有用信息 ====================" >> "$FILE"
          echo "--- locale ---" >> "$FILE"
          locale >> "$FILE"
          echo ""
          echo "--- 时区 ---" >> "$FILE"
          timedatectl 2>/dev/null | head -10 >> "$FILE" || echo "timedatectl not available" >> "$FILE"
          echo ""
          echo "--- /proc/version ---" >> "$FILE"
          cat /proc/version >> "$FILE"
          echo ""
          echo "--- uptime ---" >> "$FILE"
          uptime >> "$FILE"
          echo ""
          echo "--- whoami / id ---" >> "$FILE"
          whoami >> "$FILE"
          id >> "$FILE"
          echo ""
          echo "--- sudo 权限 ---" >> "$FILE"
          sudo -l 2>/dev/null | head -20 >> "$FILE" || echo "sudo not available" >> "$FILE"
          echo ""
          echo "--- /etc/apt/sources.list (前 20 行) ---" >> "$FILE"
          head -20 /etc/apt/sources.list 2>/dev/null >> "$FILE"
          echo ""
          echo "--- crontab ---" >> "$FILE"
          crontab -l 2>/dev/null >> "$FILE" || echo "No crontab" >> "$FILE"
          echo ""
          echo "--- systemd 服务 (running, 前 30) ---" >> "$FILE"
          systemctl list-units --type=service --state=running 2>/dev/null | head -30 >> "$FILE" || echo "systemctl not available" >> "$FILE"
          echo ""

          cat "$FILE"

      - name: 📤 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: report-ubuntu-latest
          path: report-ubuntu-latest.txt
          retention-days: 30

  # ============================================================
  # 汇总报告并创建 Release
  # ============================================================
  publish-report:
    name: 📦 发布侦察报告
    needs: probe-runners
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 下载所有报告
        uses: actions/download-artifact@v4
        with:
          path: reports
          merge-multiple: false

      - name: 📦 合并所有报告
        run: |
          echo "============================================================" > FINAL_REPORT.txt
          echo "  GitHub Actions Runner 完整侦察报告" >> FINAL_REPORT.txt
          echo "  生成时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> FINAL_REPORT.txt
          echo "  触发者: ${{ github.actor }}" >> FINAL_REPORT.txt
          echo "  运行 ID: ${{ github.run_id }}" >> FINAL_REPORT.txt
          echo "  工作流: ${{ github.workflow }}" >> FINAL_REPORT.txt
          echo "============================================================" >> FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt
          echo "" >> FINAL_REPORT.txt

          for dir in reports/*/; do
            echo "####################################################" >> FINAL_REPORT.txt
            echo "# $(basename "$dir")" >> FINAL_REPORT.txt
            echo "####################################################" >> FINAL_REPORT.txt
            echo "" >> FINAL_REPORT.txt
            cat "$dir"*.txt >> FINAL_REPORT.txt
            echo "" >> FINAL_REPORT.txt
            echo "" >> FINAL_REPORT.txt
          done

          # 同时生成 JSON 格式摘要
          echo '{' > SUMMARY.json
          echo '  "generated_at": "'$(date -u '+%Y-%m-%dT%H:%M:%SZ')'",' >> SUMMARY.json
          echo '  "runner_os": ["ubuntu-latest"],' >> SUMMARY.json
          echo '  "workflow_run_id": "${{ github.run_id }}",' >> SUMMARY.json
          echo '  "triggered_by": "${{ github.actor }}"' >> SUMMARY.json
          echo '}' >> SUMMARY.json

          echo "=== FINAL_REPORT.txt 预览（前 100 行）==="
          head -100 FINAL_REPORT.txt
          echo ""
          echo "=== 文件大小 ==="
          wc -c FINAL_REPORT.txt
          echo "=== 文件行数 ==="
          wc -l FINAL_REPORT.txt

      - name: 🚀 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: runner-report-${{ github.run_number }}
          name: "🔍 Runner 侦察报告 #${{ github.run_number }}"
          body: |
            ## GitHub Actions Runner 侦察报告

            **采集时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            **触发者**: @${{ github.actor }}
            **运行编号**: #${{ github.run_number }}

            ### 覆盖平台
            - `ubuntu-latest`

            ### 采集内容
            - 系统基本信息（OS、内核、架构）
            - GitHub Actions 元数据（runner 变量、镜像版本）
            - CPU 信息（型号、核心数、缓存、拓扑）
            - 内存信息（总量、可用、插槽详情）
            - GPU 信息（型号、显存、驱动）
            - 磁盘信息（分区、文件系统、I/O 调度）
            - 网络信息（公网 IP、Cloudflare trace、User-Agent、DNS、路由）
            - 环境变量（完整列表）
            - 已安装软件及版本
            - 虚拟化 / 容器信息
            - 安全配置（SELinux、AppArmor、防火墙）
            - 进程及资源限制
            - 编译器及构建工具
            - 其他系统配置

            > **注意**: GitHub Actions runner 配置会随时间更新，此报告仅反映采集时刻的状态。

            ### 每次手动触发即可获取最新报告
          draft: false
          prerelease: false
          files: |
            FINAL_REPORT.txt
            SUMMARY.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
